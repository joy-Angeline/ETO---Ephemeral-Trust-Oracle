<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Fira Code, ui-monospace, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d12"/>
      <stop offset="100%" stop-color="#0d1118"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5eead4"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="1000" height="560" fill="url(#bg)"/>

  <!-- Title -->
  <text x="500" y="40" fill="#e7eaf0" font-size="20" font-weight="700" text-anchor="middle">Nexus · Ephemeral Trust Oracle — Protocol Flow</text>
  <text x="500" y="64" fill="#6b7685" font-size="12.5" text-anchor="middle">Location-bound · Intent-bound · Self-destructing verdict</text>

  <!-- Lane labels -->
  <text x="60" y="130" fill="#5eead4" font-size="11" letter-spacing="2">EU WALLET</text>
  <text x="60" y="380" fill="#fb7185" font-size="11" letter-spacing="2">HOTEL TERMINAL</text>
  <text x="60" y="260" fill="#6b7685" font-size="11" letter-spacing="2">ETO SERVER (EPHEMERAL)</text>

  <!-- Step 1: Beacon -->
  <rect x="650" y="340" width="270" height="64" rx="10" fill="#181d26" stroke="#4a2630"/>
  <text x="785" y="364" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle">1. Broadcast location beacon</text>
  <text x="785" y="384" fill="#9aa3b2" font-size="11" text-anchor="middle">NFC / BLE token, TTL 2 min, no GPS</text>

  <!-- arrow beacon -> server -->
  <path d="M650 372 H 420" stroke="#fb7185" stroke-width="1.5" fill="none" marker-end="url(#arrowRose)"/>

  <!-- Step 2: Server stores beacon -->
  <rect x="365" y="220" width="270" height="64" rx="10" fill="#12161d" stroke="#232a35"/>
  <text x="500" y="244" fill="#e7eaf0" font-size="13" font-weight="700" text-anchor="middle">2. locationToken issued</text>
  <text x="500" y="264" fill="#9aa3b2" font-size="11" text-anchor="middle">held in memory only — never written to disk</text>

  <!-- arrow server -> wallet -->
  <path d="M365 252 H 100" stroke="#5eead4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 3: Wallet generates proof -->
  <rect x="80" y="100" width="270" height="78" rx="10" fill="#181d26" stroke="#2a5750"/>
  <text x="215" y="124" fill="#5eead4" font-size="13" font-weight="700" text-anchor="middle">3. Generate ZK proof</text>
  <text x="215" y="144" fill="#9aa3b2" font-size="11" text-anchor="middle">claim(EU, age&gt;18) + locationToken</text>
  <text x="215" y="161" fill="#9aa3b2" font-size="11" text-anchor="middle">+ intent("Room 404 check-in") + nonce</text>

  <!-- arrow wallet -> server -->
  <path d="M350 150 C 430 150, 430 252, 365 252" stroke="#5eead4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Step 4: Server registers proof -->
  <rect x="365" y="300" width="270" height="64" rx="10" fill="#12161d" stroke="#232a35"/>
  <text x="500" y="324" fill="#e7eaf0" font-size="13" font-weight="700" text-anchor="middle">4. Pending proof registered</text>
  <text x="500" y="344" fill="#9aa3b2" font-size="11" text-anchor="middle">zkpHash + intentHash, 60s TTL</text>

  <!-- arrow server step2 -> step4 -->
  <path d="M500 284 V 300" stroke="#6b7685" stroke-width="1.5" fill="none" stroke-dasharray="3 4"/>

  <!-- proofCode travels wallet -> hotel (NFC tap) -->
  <path d="M215 178 C 215 460, 650 460, 650 404" stroke="#5eead4" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="5 5"/>
  <text x="430" y="478" fill="#6b7685" font-size="11" text-anchor="middle">proofCode transmitted via NFC tap (no name / passport / address)</text>

  <!-- Step 5: hotel verify -->
  <rect x="650" y="220" width="270" height="64" rx="10" fill="#181d26" stroke="#4a2630"/>
  <text x="785" y="244" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle">5. Verify proof</text>
  <text x="785" y="264" fill="#9aa3b2" font-size="11" text-anchor="middle">checks zkpHash, intentHash, locationToken</text>

  <!-- arrow hotel verify -> server -->
  <path d="M650 252 H 635" stroke="#fb7185" stroke-width="1.5" fill="none" marker-end="url(#arrowRose)"/>
  <path d="M635 332 H 650 V 284" stroke="#fb7185" stroke-width="1.5" fill="none" marker-end="url(#arrowRose)" transform="translate(0,0)"/>

  <!-- Step 6: server burns -->
  <rect x="365" y="380" width="270" height="78" rx="10" fill="#1a1014" stroke="#fb7185"/>
  <text x="500" y="404" fill="#fb7185" font-size="13" font-weight="700" text-anchor="middle">6. BURN — kill switch</text>
  <text x="500" y="424" fill="#e7eaf0" font-size="11" text-anchor="middle">intentHash → burnedHashes (forever)</text>
  <text x="500" y="441" fill="#e7eaf0" font-size="11" text-anchor="middle">pendingProof + locationToken deleted</text>

  <!-- arrow burn -> hotel verdict -->
  <path d="M635 419 H 920 V 290" stroke="#fb7185" stroke-width="1.5" fill="none" marker-end="url(#arrowRose)"/>

  <!-- Step 7: verdict -->
  <rect x="650" y="100" width="270" height="78" rx="10" fill="#0f1a18" stroke="#5eead4"/>
  <text x="785" y="124" fill="#5eead4" font-size="13" font-weight="700" text-anchor="middle">7. Verdict only</text>
  <text x="785" y="144" fill="#e7eaf0" font-size="11" text-anchor="middle">"VALID · EU · age&gt;18 · EXPIRED"</text>
  <text x="785" y="161" fill="#9aa3b2" font-size="11" text-anchor="middle">door unlocks · nothing persisted</text>

  <path d="M785 220 V 178" stroke="#5eead4" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Replay attempt -->
  <rect x="650" y="20" width="270" height="0" />
  <text x="785" y="500" fill="#6b7685" font-size="11" text-anchor="middle">Any later replay of the same proofCode → "PROOF_ALREADY_DESTROYED"</text>

  <!-- legend -->
  <g transform="translate(60,510)">
    <circle cx="0" cy="0" r="4" fill="#5eead4"/>
    <text x="12" y="4" fill="#9aa3b2" font-size="11">EU Wallet ↔ Server</text>
    <circle cx="180" cy="0" r="4" fill="#fb7185"/>
    <text x="192" y="4" fill="#9aa3b2" font-size="11">Hotel Terminal ↔ Server</text>
  </g>
</svg>
